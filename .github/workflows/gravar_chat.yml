name: Gravador de Chat Automatico

on:
  schedule:
    # Das 14:00 até as 20:40 do Brasil (17:00 às 23:40 UTC)
    - cron: '*/20 17-23 * * *'
    # Das 21:00 até as 22:40 do Brasil (00:00 às 01:40 UTC do dia seguinte)
    - cron: '*/20 0-1 * * *'
  workflow_dispatch:

concurrency:
  group: gravacao-twitch
  cancel-in-progress: false

jobs:
  gravar:
    runs-on: ubuntu-latest
    steps:
    - name: Copiar o repositorio
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar o Gravador
      run: |
        pip install --upgrade pip
        # Instala a ferramenta focada estritamente na API nova da Twitch
        pip install tcd

    - name: Capturar ate a live fechar
      run: |
        # Executa o novo gravador focado no canal da sjokz
        # Ele vai rodar gravando o chat em tempo real e salvar em formato JSON
        tcd --channel sjokz --format json
        
        # Como o tcd gera um nome padrão, vamos renomear para manter seu padrão antigo
        mv *.json chat_sjokz.json || echo "Nao gerou arquivo ainda"

    - name: Salvar o arquivo no GitHub
      if: always() 
      run: |
        git config --global user.name 'Bot do Chat'
        git config --global user.email 'bot@github.com'
        
        if [ -f chat_sjokz.json ]; then
          git add chat_sjokz.json
          git commit -m "Chat da Sjokz salvo" && git push || echo "Nenhuma alteracao encontrada."
        fi
