name: Gravador de Chat Automatico

on:
  schedule:
    # Das 14:00 até as 20:40 do Brasil (17:00 às 23:40 UTC)
    - cron: '*/20 17-23 * * *'
    # Das 21:00 até as 22:40 do Brasil (00:00 às 01:40 UTC do dia seguinte)
    - cron: '*/20 0-1 * * *'
  workflow_dispatch:

concurrency:
  group: gravacao-twitch
  cancel-in-progress: false

jobs:
  gravar:
    runs-on: ubuntu-latest
    steps:
    - name: Copiar o repositorio
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar o Gravador
      run: |
        pip install chat-downloader

    - name: Capturar ate a live fechar
      run: |
        # AJUSTADO: Timeout de 21600 segundos (6 horas exatas, o limite maximo do GitHub)
        # Se a live fechar antes, ele desliga sozinho e salva na hora!
        python -m chat_downloader https://www.twitch.tv/sjokz --output chat_sjokz.json --timeout 21600 --format json

    - name: Salvar o arquivo no GitHub
      if: always() 
      run: |
        git config --global user.name 'Bot do Chat'
        git config --global user.email 'bot@github.com'
        
        if [ -f chat_sjokz.json ]; then
          git add chat_sjokz.json
          git commit -m "Chat da Sjokz salvo" && git push || echo "Nenhuma alteracao encontrada."
        fi
