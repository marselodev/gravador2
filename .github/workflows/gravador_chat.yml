name: Gravador de Chat snopey

on:
  schedule:
    - cron: '*/20 * * * *' # Tenta rodar a cada 20 minutos
  workflow_dispatch:

jobs:
  gravar_chat:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Limite máximo de 6 horas

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Cancelar se já houver outra gravação rodando
        uses: styfle/cancel-workflow-action@0.11.0
        with:
          access_token: ${{ github.token }}
          only_static_workflows: true 

      - name: Configurar Fuso Horário Brasil
        run: sudo timedatectl set-timezone America/Sao_Paulo

      - name: Instalar Dependências e TwitchDownloader
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3-pip wget libfontconfig1
          pip3 install --upgrade Pillow requests
          
          # Baixa a versão oficial do TwitchDownloaderCLI para Linux
          echo "Baixando TwitchDownloaderCLI..."
          wget https://github.com/clrcrl/TwitchDownloader/releases/latest/download/TwitchDownloaderCLI-linux-x64.tar.gz
          tar -xvf TwitchDownloaderCLI-linux-x64.tar.gz
          chmod +x TwitchDownloaderCLI
          sudo mv TwitchDownloaderCLI /usr/local/bin/

      - name: Verificar Live e Gravar Chat Ao Vivo
        env:
          TWITCH_OAUTH: ${{ secrets.TWITCH_TOKEN }}
        run: |
          echo "Iniciando monitoramento..."
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          
          if [ -f gravador_chat.py ]; then
            # Grava o chat ao vivo no arquivo chat_log.txt
            python3 gravador_chat.py
          fi
          
          # Se o arquivo de chat foi criado e tem conteúdo, o TwitchDownloader gera o vídeo bonito
          if [ -s chat_log.txt ]; then
            echo "Transformando o arquivo de texto em vídeo com TwitchDownloaderCLI..."
            # Renderiza o chat usando fontes padrão do Linux e gera o arquivo .mp4 direto
            TwitchDownloaderCLI chatrender --input chat_log.txt --output "chat_snopey_${TIMESTAMP}.mp4" --font-size 14 --width 400 --height 600 || true
          else
            echo "Nenhum chat gravado para renderizar."
          fi

      - name: Enviar Vídeo do Chat para o GitHub Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-gravado-${{ github.run_id }}
          path: "*.mp4"
          retention-days: 3
