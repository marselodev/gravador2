name: Gravador de Chat

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *' # Roda a cada 10 minutos para ver se o streamer abriu live

jobs:
  gravador_chat:
    name: Gravador de Chat
    runs-on: ubuntu-latest

    steps:
    - name: Copiar Repositório
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Streamlink e Dependências do Sistema
      run: |
        sudo apt update
        sudo apt install -y streamlink ffmpeg

    - name: Executar Gravador Inteligente
      run: python gravador.py

    - name: Disponibilizar o arquivo JSON do Chat para Download
      uses: actions/upload-artifact@v4
      with:
        name: chat-twitch
        path: "*.json"
        if-no-files-found: ignore
